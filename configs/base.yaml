# configs/base.yaml
# Global project configuration — paths, device, seeds, image size.
# All other config files inherit these as defaults.
# Blueprint §23 (Project File Structure).

# ── Project root (all relative paths are from pa-gnn/) ──────────────────────
project:
  root: "."                           # Relative to pa-gnn/
  name: "PA-GNN"

# ── Reproducibility ──────────────────────────────────────────────────────────
seed: 42
seeds_for_evaluation: [42, 123, 7]   # §19: run with 3 seeds, report mean±std

# ── Device ───────────────────────────────────────────────────────────────────
device: "auto"                        # "auto" | "cuda" | "cpu"

# ── Image size ────────────────────────────────────────────────────────────────
image_size: 512                       # All tiles are 512×512

# ── Data paths ────────────────────────────────────────────────────────────────
data:
  raw:
    dem:          "data/raw/dem"
    hirise_browse: "data/raw/hirise_browse"
    ctx:          "data/raw/ctx"
    hirise_v3:    "data/raw/hirise_v3"
  processed:
    dem_tiles:     "data/processed/tiles"        # Note: blueprint §23 says dem_tiles/ but actual impl uses tiles/
    graphs:        "data/processed/graphs"
    ctx_pretrain:  "data/processed/ctx_pretrain"
    ctx_demo:      "data/processed/ctx_demo"
  splits:          "data/splits"

# ── Checkpoint paths ─────────────────────────────────────────────────────────
checkpoints:
  dir:         "checkpoints"
  mae_encoder: "checkpoints/mae_encoder.pth"
  cnn_best:    "checkpoints/cnn_best.pt"
  fusion_best: "checkpoints/fusion_best.pt"
  gnn_best:    "checkpoints/gnn_best.pt"

# ── Results ──────────────────────────────────────────────────────────────────
results:
  dir:     "results"
  tables:  "results/tables"
  figures: "results/figures"
  logs:    "results/logs"

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  level: "INFO"                       # DEBUG | INFO | WARNING | ERROR
  format: "%(asctime)s [%(levelname)s] %(name)s — %(message)s"
  datefmt: "%H:%M:%S"

# ── Hazard thresholds (shared across all stages) ──────────────────────────────
hazard:
  threshold: 0.7                      # §10: target > 0.7 → hazardous pixel
  slope_limit_deg: 15.0               # §8: hazardous when slope > 15°
  roughness_fraction: 0.6             # §8: hazardous when roughness > 0.6 × tile_max
